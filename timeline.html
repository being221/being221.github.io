<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>春秋战国 · 历史时间线</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
  <style>
    /* ===== 基础 ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Noto Serif SC", "Source Han Serif SC", "STSong", "SimSun", serif;
      background: #f5f0e8;
      color: #3d3226;
      line-height: 1.7;
      min-height: 100vh;
    }

    /* ===== 顶部返回链接 ===== */
    .back-link {
      position: fixed; top: 16px; left: 16px; z-index: 100;
      color: #5b8c5a; text-decoration: none; font-size: 14px;
      background: rgba(245,240,232,0.9); padding: 6px 12px; border-radius: 4px;
      backdrop-filter: blur(4px);
    }
    .back-link:hover { text-decoration: underline; }

    /* ===== 页头 ===== */
    .page-header {
      text-align: center; padding: 60px 20px 20px;
    }
    .page-header h1 {
      font-size: 36px; color: #3d3226; letter-spacing: 8px;
    }
    .page-header .subtitle {
      color: #8b7355; font-size: 15px; margin-top: 8px;
    }

    /* ===== 筛选栏 ===== */
    .filter-bar {
      position: sticky; top: 0; z-index: 50;
      display: flex; gap: 10px; padding: 12px 20px;
      background: rgba(245,240,232,0.95); backdrop-filter: blur(8px);
      border-bottom: 1px solid #d4c5a0; max-width: 800px; margin: 0 auto;
    }
    .search-input {
      flex: 1; padding: 10px 16px; font-size: 15px;
      border: 1px solid #c4b998; border-radius: 4px;
      background: #faf7f0; color: #3d3226;
      font-family: inherit;
    }
    .search-input::placeholder { color: #b8a88a; }
    .search-input:focus { outline: none; border-color: #5b8c5a; }

    .filter-btn {
      padding: 10px 20px; font-size: 14px; cursor: pointer;
      border: 1px solid #c4b998; border-radius: 4px;
      background: #faf7f0; color: #3d3226; font-family: inherit;
    }
    .filter-btn:hover { background: #e8e0d0; }
    .filter-btn.active { background: #5b8c5a; color: #fff; border-color: #5b8c5a; }

    /* ===== 筛选面板 ===== */
    .filter-panel {
      max-width: 800px; margin: 0 auto; padding: 16px 20px;
      background: #faf7f0; border-bottom: 1px solid #d4c5a0;
    }
    .filter-panel.hidden { display: none; }
    .filter-section { margin-bottom: 12px; }
    .filter-section h3 {
      font-size: 13px; color: #8b7355; margin-bottom: 8px;
    }
    .filter-grid { display: flex; flex-wrap: wrap; gap: 6px; }
    .filter-chip {
      padding: 4px 12px; font-size: 13px; cursor: pointer;
      border: 1px solid #c4b998; border-radius: 14px;
      background: #f5f0e8; color: #5c4a3a; font-family: inherit;
      user-select: none; transition: background 0.15s;
    }
    .filter-chip:hover { background: #e8e0d0; }
    .filter-chip.on { background: #5b8c5a; color: #fff; border-color: #5b8c5a; }
    .apply-btn {
      margin-top: 8px; padding: 8px 24px; font-size: 14px; cursor: pointer;
      border: none; border-radius: 4px; background: #5b8c5a; color: #fff;
      font-family: inherit;
    }
    .apply-btn:hover { background: #4a7a49; }

    /* ===== 时间线容器 ===== */
    .timeline {
      max-width: 800px; margin: 0 auto; padding: 20px 20px 60px;
      position: relative;
    }

    /* ===== 脊线 ===== */
    .timeline::before {
      content: ""; position: absolute; left: 60px; top: 0; bottom: 0;
      width: 2px; background: #5b8c5a;
    }

    /* ===== 事件卡片 ===== */
    .event-card {
      position: relative; margin-bottom: 20px; margin-left: 90px;
      padding: 14px 18px; background: #faf7f0;
      border-radius: 4px; border-left: 3px solid #c4b998;
      cursor: pointer; transition: box-shadow 0.2s, border-color 0.2s;
    }
    .event-card:hover { box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
    .event-card.expanded { border-left-color: #5b8c5a; box-shadow: 0 2px 16px rgba(0,0,0,0.08); }

    /* 时间线圆点 */
    .event-card::before {
      content: ""; position: absolute;
      left: -38px; top: 18px;
      width: 12px; height: 12px; border-radius: 50%;
      background: #5b8c5a; border: 2px solid #faf7f0;
      box-shadow: 0 0 0 2px #5b8c5a;
    }

    /* 圆点按类型配色 */
    .event-card.cat-战争::before { background: #c44; box-shadow: 0 0 0 2px #c44; }
    .event-card.cat-会盟::before { background: #5b8c5a; box-shadow: 0 0 0 2px #5b8c5a; }
    .event-card.cat-改革::before { background: #d4a017; box-shadow: 0 0 0 2px #d4a017; }
    .event-card.cat-人物生卒::before { background: #6b7b8d; box-shadow: 0 0 0 2px #6b7b8d; }
    .event-card.cat-思想著作::before { background: #8b5e3c; box-shadow: 0 0 0 2px #8b5e3c; }
    .event-card.cat-政变::before { background: #8844aa; box-shadow: 0 0 0 2px #8844aa; }
    .event-card.cat-外交::before { background: #4488aa; box-shadow: 0 0 0 2px #4488aa; }

    /* 卡片内容 */
    .event-year {
      font-size: 13px; color: #8b7355; font-weight: bold;
    }
    .event-title {
      font-size: 17px; color: #3d3226; margin: 4px 0;
    }
    .event-meta {
      display: flex; gap: 8px; margin-top: 2px;
    }
    .event-meta span {
      font-size: 11px; padding: 2px 8px; border-radius: 10px;
      background: #e8e0d0; color: #5c4a3a;
    }
    .event-summary {
      margin-top: 8px; font-size: 14px; color: #5c4a3a; line-height: 1.6;
    }

    /* ===== 展开详情 ===== */
    .event-detail {
      display: none; margin-top: 12px; padding-top: 12px;
      border-top: 1px dashed #d4c5a0;
      font-size: 14px; color: #5c4a3a; line-height: 1.8;
    }
    .event-card.expanded .event-detail { display: block; }

    .event-detail p { margin-bottom: 10px; }

    .causal-links { margin-top: 10px; }
    .causal-links h5 {
      font-size: 12px; color: #8b7355; margin-bottom: 6px;
    }
    .causal-link {
      display: inline-block; margin: 2px 6px 2px 0; padding: 3px 10px;
      font-size: 12px; color: #5b8c5a; text-decoration: none;
      background: #e8e8d8; border-radius: 10px; cursor: pointer;
    }
    .causal-link:hover { background: #d4d4c0; }
    .causal-link.cause { background: #e8e0d0; }
    .causal-link.effect { background: #d8e8d8; }

    /* ===== 无结果 ===== */
    .timeline-empty {
      text-align: center; padding: 60px 20px; color: #b8a88a; font-size: 15px;
    }

    /* ===== SVG 因果连线 ===== */
    .causal-svg {
      position: absolute; top: 0; left: 0; width: 100%;
      pointer-events: none; z-index: 0;
    }
    .causal-path {
      fill: none; stroke: #c4b998; stroke-width: 1.5; opacity: 0.5;
    }
    .causal-path:hover { opacity: 0.8; stroke: #8b7355; }

    /* ===== 响应式 ===== */
    @media (max-width: 640px) {
      .page-header h1 { font-size: 26px; letter-spacing: 4px; }
      .page-header { padding-top: 50px; }
      .timeline::before { left: 24px; }
      .event-card { margin-left: 48px; }
      .event-card::before { left: -30px; width: 10px; height: 10px; top: 16px; }
      .filter-bar { padding: 10px 12px; }
      .search-input { font-size: 14px; }
      .event-title { font-size: 15px; }
      .event-summary { font-size: 13px; }
      .back-link { top: 8px; left: 8px; font-size: 12px; padding: 4px 10px; }
    }

    /* ===== 暗色主题适配 ===== */
    @media (prefers-color-scheme: dark) {
      body { background: #2a2418; color: #d4c5a0; }
      .back-link { background: rgba(42,36,24,0.9); color: #7ab87a; }
      .page-header h1 { color: #d4c5a0; }
      .page-header .subtitle { color: #a89878; }
      .filter-bar { background: rgba(42,36,24,0.95); border-bottom-color: #5c4a3a; }
      .search-input { background: #3d3226; border-color: #5c4a3a; color: #d4c5a0; }
      .search-input::placeholder { color: #7a6a5a; }
      .filter-btn { background: #3d3226; border-color: #5c4a3a; color: #d4c5a0; }
      .filter-panel { background: #3d3226; border-bottom-color: #5c4a3a; }
      .filter-chip { background: #2a2418; border-color: #5c4a3a; color: #c4b998; }
      .filter-chip.on { background: #5b8c5a; color: #fff; }
      .apply-btn { background: #5b8c5a; }
      .event-card { background: #3d3226; border-left-color: #5c4a3a; }
      .event-card:hover { box-shadow: 0 2px 12px rgba(0,0,0,0.2); }
      .event-card.expanded { border-left-color: #7ab87a; }
      .event-card::before { border-color: #3d3226; }
      .event-year { color: #a89878; }
      .event-title { color: #d4c5a0; }
      .event-meta span { background: #2a2418; color: #b8a88a; }
      .event-summary { color: #b8a88a; }
      .event-detail { color: #b8a88a; border-top-color: #5c4a3a; }
      .causal-link { background: #2a2418; }
      .timeline-empty { color: #7a6a5a; }
      .causal-path { stroke: #5c4a3a; }
    }
  </style>
</head>
<body>
  <a href="index.html" class="back-link">← 返回主页</a>

  <header class="page-header">
    <h1>春秋战国</h1>
    <p class="subtitle">前770 — 前221 · 五百余年霸业与争鸣</p>
  </header>

  <div class="filter-bar" id="filter-bar">
    <input type="text" id="search" class="search-input" placeholder="搜索事件或关键词..." aria-label="搜索事件或关键词">
    <button id="filter-btn" class="filter-btn">筛选</button>
  </div>

  <div id="filter-panel" class="filter-panel hidden">
    <div class="filter-section">
      <h3>国家</h3>
      <div class="filter-grid" id="country-grid"></div>
    </div>
    <div class="filter-section">
      <h3>类型</h3>
      <div class="filter-grid" id="category-grid"></div>
    </div>
    <button id="apply-filter" class="apply-btn">应用筛选</button>
  </div>

  <main id="timeline" class="timeline"></main>

  <svg id="causal-svg" class="causal-svg"></svg>

  <script>
    // ===== 事件数据 =====
    const EVENTS = [
      // ── 西周灭亡 / 东周开始 ──
      { id: 1, year: -771, title: "犬戎攻破镐京", country: "周", category: "战争",
        summary: "犬戎攻破镐京，杀周幽王于骊山下，西周灭亡。",
        detail: "周幽王宠褒姒，废申后与太子宜臼，改立褒姒之子伯服。申后之父申侯联合缯国、犬戎攻周，幽王举烽火征兵不至，被杀于骊山。镐京残破，西周二百五十七年基业至此终结。",
        causes: [], effects: [2] },
      { id: 2, year: -770, title: "平王东迁", country: "周", category: "政变",
        summary: "周平王在诸侯护卫下东迁雒邑，东周开始，王室衰微。",
        detail: "犬戎之乱后镐京残破，晋文侯、郑武公、秦襄公等诸侯率兵护送平王东迁至雒邑（今洛阳）。自此周王室直辖领地大减，权威一落千丈，诸侯争霸时代拉开序幕。",
        causes: [1], effects: [3, 4, 6] },

      // ── 春秋初期：郑庄公小霸 ──
      { id: 3, year: -743, title: "郑庄公平定共叔段之乱", country: "郑", category: "政变",
        summary: "郑庄公击败其弟共叔段的叛乱，稳固郑国内政。",
        detail: "郑武公夫人武姜偏爱幼子共叔段，多次为段请求封地。郑庄公隐忍不发，待段起兵叛乱时一举平定。此事件中\"多行不义必自毙\"、\"不及黄泉无相见也\"等典故流传后世。",
        causes: [], effects: [4] },
      { id: 4, year: -720, title: "周郑交质", country: "周", category: "外交",
        summary: "周平王与郑庄公互换人质，天子权威荡然无存。",
        detail: "周平王不满郑庄公专权，欲分权于虢公。郑庄公质问平王，平王否认，双方交换人质——周王子狐质于郑，郑公子忽质于周。从此天子与诸侯平起平坐，礼崩乐坏之象已现。",
        causes: [2, 3], effects: [5] },
      { id: 5, year: -707, title: "繻葛之战", country: "郑", category: "战争",
        summary: "郑庄公大败周桓王联军，射伤天子肩膀，诸侯不再尊王。",
        detail: "周桓王率陈、蔡、卫等国联军讨伐郑国，双方战于繻葛。郑国以鱼丽之阵大破王师，祝聃一箭射中桓王肩膀。自此周天子威信扫地，诸侯争霸时代正式开始。",
        causes: [4], effects: [] },

      // ── 齐桓公霸业 ──
      { id: 6, year: -685, title: "齐桓公即位", country: "齐", category: "政变",
        summary: "公子小白抢先回国即位，是为齐桓公，后成春秋首霸。",
        detail: "齐襄公被弑后国内大乱，公子纠与公子小白各自从鲁、莒回国争位。管仲半路截击小白，射中其带钩，小白佯死抢先入齐即位。后听鲍叔牙之荐，不计前嫌任用管仲为相。",
        causes: [2], effects: [7, 8] },
      { id: 7, year: -684, title: "长勺之战", country: "齐", category: "战争",
        summary: "鲁国曹刿以弱胜强击败齐军，「一鼓作气」典故来源。",
        detail: "齐桓公即位后伐鲁复仇。鲁人曹刿请见鲁庄公，提出「肉食者鄙，未能远谋」。战中曹刿待齐军三鼓气竭而后击之，大败齐军。此战留下「一鼓作气，再而衰，三而竭」的名句。",
        causes: [6], effects: [] },
      { id: 8, year: -681, title: "北杏会盟", country: "齐", category: "会盟",
        summary: "齐桓公首次主持诸侯会盟，开启霸主会盟模式。",

        causes: [6], effects: [12] },

      // ── 更多春秋事件 ──
      { id: 9, year: -679, title: "鄄之会", country: "齐", category: "会盟",
        summary: "齐桓公在鄄地大会诸侯，正式确立霸主地位。",
        detail: "齐桓公在鄄（今山东鄄城）召集宋、陈、卫、郑等国诸侯大会盟，周天子派单伯与会，正式承认齐桓公的霸主地位。",

      { id: 10, year: -662, title: "庆父之乱", country: "鲁", category: "政变",

      { id: 11, year: -660, title: "卫懿公好鹤亡国", country: "卫", category: "战争",

      { id: 13, year: -658, title: "齐桓公救邢存卫", country: "齐", category: "战争",

        causes: [11], effects: [12] },
      { id: 14, year: -645, title: "管仲去世", country: "齐", category: "人物生卒",

        causes: [], effects: [16] },
      { id: 15, year: -645, title: "韩原之战", country: "秦", category: "战争",

        detail: "晋惠公背信弃义，拒绝兑现先前对秦国的割地承诺，且趁秦国饥荒时不出粜粮。秦穆公怒而伐晋，战于韩原，俘虏晋惠公。后以晋太子圉为质、割河西之地而释惠公。",

      { id: 16, year: -643, title: "齐桓公去世", country: "齐", category: "人物生卒",

      { id: 17, year: -638, title: "泓水之战", country: "宋", category: "战争",

        detail: "重耳因骊姬之乱流亡在外十九年，遍历狄、卫、齐、曹、宋、郑、楚、秦等国，备尝艰辛。在秦穆公支持下归国即位，时年六十二岁。即位后整顿内政，晋国迅速强盛。",
        causes: [], effects: [19] },
      { id: 19, year: -632, title: "城濮之战", country: "晋", category: "战争",
        summary: "晋文公大败楚军于城濮，「退避三舍」典出于此。",
        detail: "楚成王率陈蔡联军围宋，晋文公出兵救宋。兑现当年流亡楚国时「退避三舍」的诺言，晋军后撤九十里。楚将子玉轻敌追击，晋军以虎皮蒙马大破楚军。战后晋文公在践土会盟诸侯，成为霸主。",
        causes: [18], effects: [20, 21] },
      { id: 20, year: -632, title: "践土之盟", country: "晋", category: "会盟",
        summary: "城濮之战后晋文公大会诸侯，周襄王亲自册封为霸主。",
        detail: "晋文公在践土（今河南原阳）召集鲁、齐、宋、蔡、郑、卫等国诸侯会盟，周襄王亲自到场册封晋文公为「侯伯」，赐大辂、戎辂、弓矢、秬鬯。晋国霸业由此确立。",
        causes: [19], effects: [] },
      { id: 21, year: -628, title: "晋文公去世", country: "晋", category: "人物生卒",
        summary: "晋文公在位仅九年而去世，但已奠定晋国百年霸业基础。",
        detail: "晋文公六十二岁即位，在位九年而卒。虽然执政时间不长，但三军建制、城濮大捷、践土会盟为晋国奠定了中原霸主地位。此后晋国虽经历起伏，但始终保持强国地位直至三家分晋。",
        causes: [], effects: [] },

      { id: 22, year: -627, title: "崤之战", country: "秦", category: "战争",
        summary: "秦军远征郑国未果，归途在崤山遭晋伏击，全军覆没。",
        detail: "秦穆公趁晋文公之丧出兵远征郑国，因郑商人弦高假犒师而退兵。归途中在崤山遭晋襄公伏击，三万秦军全军覆没，孟明视等三帅被俘。秦晋之好由此破裂，转为世仇。",
        causes: [21], effects: [24] },
      { id: 23, year: -624, title: "秦穆公伐晋", country: "秦", category: "战争",
        summary: "秦穆公为崤山之败复仇，渡河焚舟大破晋军。",
        detail: "秦穆公亲率大军伐晋，渡黄河后焚烧战船以示必死之心，连战连捷，攻取晋国王官、郊邑。晋人坚守不出，秦军从茅津渡河至崤山，收葬三年前阵亡将士骨骸而还。此后秦穆公转而西进称霸西戎。",
        causes: [22], effects: [25] },
      { id: 24, year: -625, title: "彭衙之战", country: "秦", category: "战争",
        summary: "秦晋再战彭衙，秦军再次败北。",
        detail: "秦将孟明视率军伐晋以报崤山之仇，双方战于彭衙。秦军再次大败，晋人讥讽秦军为「拜赐之师」。秦穆公依然信任孟明视，使其更加勤勉治国。",
        causes: [22], effects: [23] },
      { id: 25, year: -621, title: "秦穆公去世", country: "秦", category: "人物生卒",
        summary: "秦穆公去世，以一百七十七人殉葬，秦国霸业中断。",
        detail: "秦穆公在位三十九年，西霸戎狄，扩地千里，为日后秦统一奠定基础。但以子车氏三良等一百七十七人殉葬，国人哀之，作《黄鸟》之诗。此后秦国沉寂近两百年，至秦孝公时才再次崛起。",
        causes: [], effects: [] },

      { id: 26, year: -614, title: "楚庄王即位", country: "楚", category: "政变",
        summary: "楚庄王即位，三年不鸣，一鸣惊人。",
        detail: "楚穆王去世，年幼的楚庄王即位。即位三年不理朝政，日夜为乐，并下令「敢谏者死」。伍举以隐语进谏：「有鸟在于阜，三年不飞不鸣，是何鸟也？」庄王答：「三年不飞，飞将冲天；三年不鸣，鸣将惊人。」于是亲政。",
        causes: [], effects: [27] },
      { id: 27, year: -606, title: "楚庄王问鼎中原", country: "楚", category: "外交",
        summary: "楚庄王兵临洛邑问九鼎轻重，公然挑战周天子权威。",
        detail: "楚庄王伐陆浑之戎后率军至洛邑郊外阅兵示威，周定王派王孙满劳军。庄王问九鼎大小轻重，王孙满答：「在德不在鼎。周德虽衰，天命未改，鼎之轻重，未可问也。」庄王遂退兵。「问鼎」由此成为觊觎政权的代名词。",
        causes: [26], effects: [] },
      { id: 28, year: -597, title: "邲之战", country: "楚", category: "战争",
        summary: "楚庄王大败晋军于邲，确立楚国霸权。",
        detail: "楚庄王围郑，晋国派荀林父率三军救郑。晋军将帅意见不一，军令混乱。楚军在邲（今河南荥阳东北）突袭晋军，晋军大溃，争渡黄河时自相残杀。战后楚庄王成为中原霸主。",
        causes: [26], effects: [29] },
      { id: 29, year: -591, title: "楚庄王去世", country: "楚", category: "人物生卒",
        summary: "一代霸主楚庄王去世，楚国霸业开始走下坡路。",
        detail: "楚庄王在位二十三年，饮马黄河、问鼎中原、邲之战大败晋国，将楚国推向极盛。去世后由其年幼之子继位，楚国陷入内部动荡与晋楚反复争霸之中。",
        causes: [], effects: [] },

      { id: 30, year: -589, title: "鞍之战", country: "晋", category: "战争",
        summary: "晋齐鞍地大战，齐国大败求和。",
        detail: "齐顷公侵鲁，晋郤克率军救鲁伐齐，战于鞍（今山东济南）。齐顷公轻敌，扬言「灭此朝食」（先灭了对方再吃早饭），结果齐军大败，顷公几乎被俘。此战巩固了晋国霸业。",
        causes: [], effects: [] },
      { id: 31, year: -584, title: "申公巫臣使吴", country: "吴", category: "外交",
        summary: "楚国叛臣巫臣出使吴国教习车战，吴国自此崛起。",
        detail: "楚国申公巫臣因私怨叛楚投晋，后又自请出使吴国。巫臣教吴人车战阵法，并让其子狐庸为吴行人。吴国从此学会了中原的战争技术，开始侵扰楚国后方，成为楚国心腹大患。",
        causes: [], effects: [42, 46] },
      { id: 32, year: -579, title: "华元弭兵", country: "宋", category: "会盟",
        summary: "宋国大夫华元促成第一次晋楚弭兵盟会。",
        detail: "宋国执政华元与晋国正卿栾书、楚令尹子重均有私交，促成晋楚两国在宋国西门之外会盟。盟约约定「无相加戎，好恶同之，同恤灾危」。这是历史上第一次大国之间的和平同盟尝试，但仅维持三年便被打破。",
        causes: [], effects: [] },
      { id: 33, year: -575, title: "鄢陵之战", country: "晋", category: "战争",
        summary: "晋楚鄢陵大战，晋军再次大败楚军。",
        detail: "晋楚战于鄢陵（今河南鄢陵）。楚共王被晋将吕锜射中眼睛，楚军夜遁。此战晋国再次在正面战场击败楚国，但战后晋国内部卿族矛盾日益尖锐，无力乘胜扩大战果。",
        causes: [], effects: [] },

      { id: 34, year: -562, title: "晋三分公室", country: "晋", category: "改革",
        summary: "晋国六卿瓜分公室军队，公室权力进一步削弱。",
        detail: "晋悼公时六卿（韩、赵、魏、智、范、中行）将晋国三军改为四军，六卿各领一军，公室军队被卿族瓜分。公室的军事实力被彻底剥夺，为后来的三家分晋埋下伏笔。",
        causes: [], effects: [66] },
      { id: 35, year: -551, title: "孔子出生", country: "鲁", category: "人物生卒",
        summary: "孔子出生于鲁国陬邑，儒家学派创始人降世。",
        detail: "孔子名丘，字仲尼，其父叔梁纥为鲁国陬邑大夫，年近七十娶颜氏女徵在而生孔子。孔子三岁丧父，家境贫寒，但自幼好学，立志恢复周礼。",
        causes: [], effects: [] },

      { id: 36, year: -548, title: "崔杼弑齐庄公", country: "齐", category: "政变",
        summary: "齐国权臣崔杼弑杀齐庄公，齐国卿族斗争白热化。",
        detail: "齐庄公与崔杼之妻棠姜私通，崔杼愤而弑君。齐国太史兄弟四人相继记载「崔杼弑其君」，被崔杼连杀三人，第四个太史仍然照样书写。南史氏听说后也执简前往，准备继续。崔杼无奈放弃。",
        causes: [], effects: [] },
      { id: 37, year: -546, title: "弭兵之会", country: "宋", category: "会盟",
        summary: "宋国向戌促成第二次弭兵大会，晋楚达成长期和平。",
        detail: "宋国大夫向戌与晋国赵武、楚国令尹子木有交情，促成晋楚在宋国举行弭兵大会。约定「晋楚之从交相见」——即晋的属国朝楚、楚的属国朝晋。此盟约维持了约四十年中原和平。",
        causes: [], effects: [] },

      { id: 38, year: -543, title: "子产相郑", country: "郑", category: "改革",
        summary: "子产在郑国执政，推行一系列改革。",
        detail: "子产名公孙侨，郑国执政大夫。执政期间「作封洫」（整顿田界沟渠）、「作丘赋」（改革军赋制度）、「铸刑书」（将法律铸于鼎上公之于众），使夹在晋楚之间的弱小郑国保持了数十年的稳定和尊严。",
        causes: [], effects: [39, 40] },
      { id: 39, year: -536, title: "郑国铸刑书", country: "郑", category: "改革",
        summary: "子产将刑法铸于鼎上，是中国历史上首次公布成文法。",
        detail: "子产将郑国的刑法条文铸在青铜鼎上，公之于众。此前法律是秘密的——「刑不可知则威不可测」。晋国大夫叔向写信激烈反对，认为公布法律会让民众「弃礼而征于书」。子产不为所动，开创了法治先河。",
        causes: [38], effects: [] },
      { id: 40, year: -522, title: "子产去世", country: "郑", category: "人物生卒",
        summary: "子产去世，孔子闻讯流泪称其为「古之遗爱」。",
        detail: "子产执政二十余年而卒，郑国男女皆哀哭，数月不闻竽琴之声。孔子后来闻子产之卒，为之流涕，称其「古之遗爱也」——即古人仁爱的典范。",
        causes: [], effects: [] },
      { id: 41, year: -517, title: "孔子适周问礼", country: "鲁", category: "思想著作",
        summary: "孔子前往洛邑向老子问礼，儒道两家思想首次交汇。",
        detail: "孔子在鲁昭公支持下前往周都洛邑，向周守藏室之史老子请教礼制。老子说：「良贾深藏若虚，君子盛德容貌若愚。」孔子回去后对弟子说：「鸟，吾知其能飞……至于龙，吾不能知其乘风云而上天。吾今日见老子，其犹龙邪！」",
        causes: [], effects: [] },

      { id: 42, year: -506, title: "柏举之战", country: "吴", category: "战争",
        summary: "吴王阖闾以孙武、伍子胥为将，五战破楚入郢都。",
        detail: "吴王阖闾以孙武为大将、伍子胥为谋主，大举伐楚。双方战于柏举，楚军大败。吴军五战五胜，直入楚国郢都。楚昭王仓皇出逃。伍子胥掘楚平王墓鞭尸三百以报父兄之仇。",
        causes: [31], effects: [44] },
      { id: 43, year: -500, title: "齐鲁夹谷会盟", country: "鲁", category: "会盟",
        summary: "孔子以相礼身份参与夹谷之会，以礼斥退齐人。",
        detail: "齐鲁两国在夹谷会盟，孔子以鲁国相礼身份出席。齐国欲以莱夷之兵劫持鲁定公，孔子以「裔不谋夏，夷不乱华」斥退之。齐人又在盟书上加不平等条款，孔子据理力争，最终齐人归还汶阳之田。",
        causes: [], effects: [] },
      { id: 44, year: -496, title: "檇李之战", country: "越", category: "战争",
        summary: "吴王阖闾伐越，被越王勾践击败，阖闾伤重而死。",
        detail: "吴王阖闾趁越王允常之丧伐越，越王勾践率军迎击于檇李。越人以死士阵前自刎吸引吴军注意，趁势攻击。吴军大乱，阖闾被越将灵姑浮以戈击伤脚趾，退兵途中伤重而死。临终嘱其子夫差勿忘报仇。",
        causes: [], effects: [45, 46] },
      { id: 45, year: -494, title: "夫椒之战", country: "吴", category: "战争",
        summary: "吴王夫差大败越军，勾践率残部退守会稽山。",
        detail: "夫差即位后日夜练兵以报父仇。越王勾践因胜而骄，不听范蠡劝阻主动伐吴。吴越战于夫椒，越军大溃。勾践率五千残兵退守会稽山，派文种贿赂吴太宰伯嚭求和，夫差不听伍子胥劝阻同意议和。",
        causes: [44], effects: [47, 48] },
      { id: 46, year: -493, title: "勾践入吴为质", country: "越", category: "外交",
        summary: "越王勾践携夫人入吴为奴，卧薪尝胆的开始。",
        detail: "夫差同意越国求和的条件之一是勾践入吴为臣。勾践携夫人及范蠡入吴，住石室、为夫差驾车养马，三年如一日毫无怨色。夫差渐生怜悯，不顾伍子胥激烈反对放勾践回国。",
        causes: [45], effects: [51] },
      { id: 47, year: -484, title: "伍子胥之死", country: "吴", category: "人物生卒",
        summary: "伍子胥被夫差赐死，临终预言越必灭吴。",
        detail: "夫差听信伯嚭谗言，怀疑伍子胥里通齐国，赐属镂之剑令其自杀。伍子胥临死前说：「抉吾眼悬吴东门之上，以观越寇之入灭吴也！」夫差闻言大怒，将其尸首以鸱夷革裹之投入江中。",
        causes: [], effects: [] },
      { id: 48, year: -484, title: "孔子归鲁", country: "鲁", category: "人物生卒",
        summary: "孔子结束十四年周游列国，回到鲁国专心整理文献。",
        detail: "孔子周游列国十四年，先后到过卫、曹、宋、郑、陈、蔡、楚等国，屡遭困厄——过宋遭桓魋追杀、过匡被围困、在陈蔡之间绝粮七日。季康子以厚礼迎孔子归鲁，孔子时年六十八岁。此后潜心整理六经、教授弟子。",
        causes: [], effects: [49] },
      { id: 49, year: -482, title: "黄池之会", country: "吴", category: "会盟",
        summary: "夫差北上黄池争霸主之位，越国趁虚攻吴。",
        detail: "夫差开挖邗沟连接江淮，率吴军北上至黄池（今河南封丘）与晋定公争盟主之位。同时越王勾践趁吴国空虚，发兵攻入吴都，杀吴太子。夫差闻讯急归，霸业自此崩溃。",
        causes: [46], effects: [51] },
      { id: 50, year: -481, title: "春秋记事终", country: "鲁", category: "思想著作",
        summary: "孔子修订《春秋》至本年止，「西狩获麟」为绝笔。",
        detail: "鲁哀公西狩获麟，孔子见麟而叹「吾道穷矣」。《春秋》记事自鲁隐公元年至哀公十四年，共二百四十二年。后人因此将这段历史称为「春秋时期」。次年子路死于卫国内乱，又次年孔子去世。",
        causes: [48], effects: [52] },
      { id: 51, year: -480, title: "子路之死", country: "卫", category: "人物生卒",
        summary: "子路在卫国孔悝之乱中战死，「君子死，冠不免」。",
        detail: "卫国发生政变，子路时为孔悝家臣，闻讯冲入城中救主。战斗中冠缨被击断，子路说：「君子死，冠不免。」在结缨正冠时被砍死。孔子闻讯大哭，自此不食肉酱。",
        causes: [], effects: [] },

      { id: 52, year: -479, title: "孔子去世", country: "鲁", category: "人物生卒",
        summary: "孔子在鲁国去世，享年七十三岁，葬于泗水之上。",
        detail: "孔子自知将不久于人世，一天早上负杖逍遥于门而歌：「泰山其颓乎！梁木其坏乎！哲人其萎乎！」七天后去世。弟子们服心丧三年，子贡在墓旁结庐守丧六年。孔子的言论和思想由其弟子及再传弟子编为《论语》。",
        causes: [50, 51], effects: [53] },

      { id: 53, year: -478, title: "勾践灭吴", country: "越", category: "战争",
        summary: "勾践经过二十年卧薪尝胆，最终灭亡吴国。",
        detail: "勾践自吴归国后卧薪尝胆，生聚教训，国力渐复。趁夫差北上黄池之机攻入吴都。此后连年攻吴，最终围困吴都三年。夫差求和被拒后自杀，临死时说：「吾无以见子胥！」勾践灭吴后率兵北渡淮河，与齐鲁诸侯会盟于徐州。",
        causes: [46, 49], effects: [54] },
      { id: 54, year: -476, title: "战国时期开始", country: "周", category: "政变",
        summary: "春秋时期结束，战国时代拉开序幕。",
        detail: "勾践灭吴标志着春秋时代的终结。此后天下进入以齐、楚、燕、韩、赵、魏、秦七国争雄的战国时期。司马迁《史记·六国年表》以本年（周元王元年）为战国之始。",
        causes: [53], effects: [] },

      // ── 战国初期 ──
      { id: 55, year: -473, title: "越王勾践称霸", country: "越", category: "会盟",
        summary: "勾践灭吴后北上徐州大会诸侯，成为春秋最后一位霸主。",
        detail: "勾践灭吴后率军北渡淮河，与齐、晋诸侯会盟于徐州，并向周天子进贡。周元王赐勾践胙肉，命为伯。越国迁都琅琊，成为当时最强盛的南方大国。",
        causes: [53], effects: [] },
      { id: 56, year: -453, title: "三家灭智", country: "晋", category: "战争",
        summary: "赵、韩、魏三家联合灭亡智氏，三家分晋格局奠定。",
        detail: "晋国六卿经过长期斗争后剩下智、赵、韩、魏四家。智伯瑶率领韩魏围攻赵襄子于晋阳，引汾水灌城。赵襄子暗中说服韩康子、魏桓子，三家联合反攻灭智伯，尽分智氏土地。此战奠定了三家分晋的基础。",
        causes: [34], effects: [60] },
      { id: 57, year: -445, title: "魏文侯即位", country: "魏", category: "政变",
        summary: "魏文侯即位，开启战国第一个变法强国时代。",
        detail: "魏文侯名斯（或都），在位五十年。他礼贤下士，任用李悝变法、吴起治军、西门豹治邺、乐羊灭中山，使魏国成为战国初期最强大的国家。子夏（孔子弟子）为之师，魏国一时成为中原文化中心。",
        causes: [], effects: [58, 59] },
      { id: 58, year: -422, title: "李悝变法", country: "魏", category: "改革",
        summary: "李悝在魏国推行战国首次系统变法。",
        detail: "李悝（又名李克）为魏文侯相，推行「尽地力之教」（鼓励精耕细作提高产量）、「平籴法」（国家丰年收购粮食、歉年平价出售以平抑粮价），并撰《法经》六篇——盗法、贼法、囚法、捕法、杂法、具法，是中国历史上第一部系统的成文法典。",
        causes: [57], effects: [59] },
      { id: 59, year: -409, title: "吴起为魏将", country: "魏", category: "战争",
        summary: "吴起在魏国任将，创「武卒制」，攻取秦国河西之地。",
        detail: "吴起在魏国创立「武卒制」——精选壮士进行严格军事训练，入选者免全户赋税。吴起率魏武卒大破秦军，攻取河西五城，设置西河郡。吴起与士卒同衣食，亲为士卒吮疽，深得军心。",
        causes: [57], effects: [63] },
      { id: 60, year: -403, title: "三家分晋", country: "晋", category: "政变",
        summary: "周威烈王正式册封赵、韩、魏为诸侯，晋国名存实亡。",
        detail: "周威烈王承认既成事实，册封赵籍、韩虔、魏斯为诸侯。司马光《资治通鉴》以此事开篇，认为天子自坏礼法——「三晋之列于诸侯，非三晋之坏礼，乃天子自坏之也」。此事被视为战国的标志性事件。",
        causes: [56], effects: [61] },
      { id: 61, year: -391, title: "田和迁齐康公", country: "齐", category: "政变",
        summary: "田氏将末代姜齐国君迁至海上，田齐代姜齐已成定局。",
        detail: "田氏家族自田完奔齐以来经营一百八十余年，逐渐架空姜齐公室。田和将齐康公迁至海滨孤岛，仅留一城以奉姜齐祭祀。至此姜太公建立的齐国实际上已经灭亡。",
        causes: [], effects: [62] },
      { id: 62, year: -386, title: "田氏代齐", country: "齐", category: "政变",
        summary: "周安王正式册封田和为齐侯，田氏齐国成立。",
        detail: "田和通过魏文侯的关系请周天子册封自己为齐侯。周安王承认田和为诸侯，田氏齐国正式取代姜姓齐国。战国七雄中的齐国进入了田氏时代，后来的齐威王、齐宣王等均为田氏子孙。",
        causes: [61], effects: [] },

      { id: 63, year: -383, title: "吴起奔楚", country: "楚", category: "政变",
        summary: "吴起因受排挤离开魏国投奔楚国，开始楚国变法。",
        detail: "魏文侯去世后魏武侯即位，吴起遭到魏相公叔痤排挤，被迫离开魏国投奔楚国。楚悼王久闻吴起之名，任命其为令尹（楚国的最高官职），在楚国推行变法。",
        causes: [59], effects: [64] },
      { id: 64, year: -381, title: "吴起变法失败被杀", country: "楚", category: "改革",
        summary: "吴起在楚国推行激进变法，楚悼王死后被旧贵族射杀。",
        detail: "吴起在楚国变法：废除贵族世袭官爵、令贵族迁往边远地区、裁汰冗官、抚养战士。变法触怒了大批旧贵族。楚悼王死后，旧贵族趁治丧之机围攻吴起，吴起伏在悼王尸体上被乱箭射死，箭矢同时射中王尸。新楚王继位后按「丽兵于王尸者夷三族」之法诛灭七十余家贵族。",
        causes: [63], effects: [] },
      { id: 65, year: -376, title: "三家灭晋", country: "晋", category: "政变",
        summary: "赵、韩、魏废除晋国末代国君，瓜分剩余领地，晋国彻底灭亡。",
        detail: "赵敬侯、韩哀侯、魏武侯联合废除晋静公，将其迁为庶人，瓜分晋国最后的绛都和曲沃两地。自唐叔虞受封以来的晋国至此彻底灭亡。",
        causes: [60], effects: [] },
      { id: 66, year: -375, title: "韩灭郑", country: "韩", category: "战争",
        summary: "韩国灭亡郑国，迁都新郑。",
        detail: "韩国趁郑国内乱出兵灭郑，将国都从平阳迁至新郑。郑国自郑桓公始封至此灭亡，享国四百余年。新郑成为韩国都城直至韩国灭亡，也是后来《韩非子》的诞生地。",
        causes: [], effects: [] },

      // ── 秦孝公与商鞅变法 ──
      { id: 67, year: -361, title: "秦孝公即位", country: "秦", category: "政变",
        summary: "秦孝公即位，发布求贤令招揽天下人才。",
        detail: "秦孝公嬴渠梁即位时秦国僻处西陲，被中原诸侯视为戎狄。孝公愤而发布求贤令：「宾客群臣有能出奇计强秦者，吾且尊官，与之分土。」商鞅闻令人秦，通过宠臣景监三见孝公，终以「霸道」之说打动孝公。",
        causes: [], effects: [68, 69] },
      { id: 68, year: -359, title: "商鞅第一次变法", country: "秦", category: "改革",
        summary: "商鞅在秦国推行第一次变法，徙木立信。",
        detail: "商鞅在栎阳城南门立三丈之木，宣布能搬到北门者赏十金。无人相信，增至五十金。有人试之，果然得赏。自此法令取信于民。第一次变法：实行「什伍连坐」、奖励军功（以斩首计功授予爵位）、重农抑商、废除世卿世禄。",
        causes: [67], effects: [71] },
      { id: 69, year: -356, title: "齐威王即位", country: "齐", category: "政变",
        summary: "齐威王即位，也上演了「一鸣惊人」的戏码。",
        detail: "齐威王初即位时不理朝政，委政于卿大夫。淳于髡以隐语进谏：「国中有大鸟，止王之庭，三年不飞不鸣，王知此鸟何也？」威王答：「此鸟不飞则已，一飞冲天；不鸣则已，一鸣惊人。」于是召七十二县令，赏即墨大夫、烹阿大夫，齐国大治。",
        causes: [], effects: [70] },

      { id: 70, year: -354, title: "桂陵之战", country: "齐", category: "战争",
        summary: "孙膑围魏救赵，在桂陵大败魏军。",
        detail: "魏将庞涓率军围赵都邯郸，赵向齐求救。齐威王以田忌为将、孙膑为军师（孙膑因庞涓陷害被挖去膝盖骨，从魏逃齐）。孙膑以「围魏救赵」之策直捣大梁，迫使庞涓回师，在桂陵设伏大败魏军。",
        causes: [69], effects: [] },
      { id: 71, year: -351, title: "商鞅第二次变法", country: "秦", category: "改革",
        summary: "商鞅推行第二次更深层次的变法，迁都咸阳。",
        detail: "第二次变法：废除井田制、开阡陌封疆（允许土地买卖）；推行县制（设三十一县，县令由国君任免）；统一度量衡；迁都咸阳；禁止父子兄弟同室而居（改革戎狄风俗）。此次变法从根本上改变了秦国的社会经济结构。",
        causes: [68], effects: [76] },
      { id: 72, year: -344, title: "逢泽之会", country: "魏", category: "会盟",
        summary: "魏惠王在逢泽大会诸侯，魏国霸业顶峰。",
        detail: "魏惠王（魏罃）在逢泽（今河南开封东南）召集十二诸侯会盟，并率诸侯朝见周天子。魏国此时国力达到极盛——西有西河郡、北灭中山、南压楚境。但盛极而衰，很快将遭到齐秦两面夹击。",
        causes: [], effects: [73] },

      { id: 73, year: -342, title: "马陵之战", country: "齐", category: "战争",
        summary: "孙膑在马陵道设伏，庞涓自刎，魏国霸业终结。",
        detail: "魏将庞涓率军伐韩，韩向齐求救。孙膑再使「围魏救赵」之策，并以减灶诱敌之计诱庞涓轻兵追击。至马陵道（今河南范县），齐军伏兵万弩齐发，魏军全军覆没。庞涓自刎前叹道：「遂成竖子之名！」此战后魏国元气大伤，霸权旁落。",
        causes: [70], effects: [74] },
      { id: 74, year: -341, title: "孙膑杀庞涓", country: "齐", category: "战争",
        summary: "马陵道万弩伏击，庞涓自刎而死。",
        detail: "马陵道狭窄，两旁多险隘。孙膑令人斫大树白而书之：「庞涓死于此树之下」。庞涓夜至树下举火读字，齐军万弩俱发。庞涓自知智穷兵败，自刎前说：「遂成竖子之名！」孙膑大仇得报，后隐居著《孙膑兵法》。",
        causes: [73], effects: [] },

      { id: 75, year: -338, title: "商鞅被车裂", country: "秦", category: "人物生卒",
        summary: "秦孝公去世，商鞅被诬告谋反，车裂而死。",
        detail: "秦孝公去世，太子嬴驷即位为秦惠文王。公子虔等人诬告商鞅谋反。商鞅逃亡至函谷关，欲投宿客舍而无法出示身份证明——自己立的法反噬己身。后入商邑起兵抵抗，兵败被车裂，全家被灭。但新法不废，「商君死，秦法未败」。",
        causes: [71], effects: [] },
      { id: 76, year: -334, title: "徐州相王", country: "齐", category: "会盟",
        summary: "齐威王与魏惠王在徐州相互尊对方为王。",
        detail: "齐魏两国在徐州（今山东滕州）互相承认对方君主称王——齐威王、魏惠王。此前只有周天子可以称王，诸侯称王意味着周天子名分上的权威也已荡然无存。此后各诸侯陆续称王。",
        causes: [73], effects: [] },

      { id: 77, year: -328, title: "张仪相秦", country: "秦", category: "外交",
        summary: "纵横家张仪入秦为相，推行连横策略对抗合纵。",
        detail: "张仪魏国人，师从鬼谷子，学纵横之术。入秦后被秦惠文王任为相邦，推行「连横」之策——使六国各自与秦连横而瓦解合纵。张仪凭借三寸不烂之舌游走列国，是战国最著名的纵横家。",
        causes: [], effects: [78, 80] },
      { id: 78, year: -318, title: "第一次合纵攻秦", country: "秦", category: "战争",
        summary: "公孙衍组织五国合纵伐秦，被秦国击退。",
        detail: "魏人公孙衍（号犀首）组织魏、赵、韩、燕、楚五国合纵攻秦，推楚怀王为纵约长。但各国各怀心思，楚燕态度消极，实际出兵的只有三晋。秦军在函谷关击败联军。此战后张仪的连横策略逐渐占据上风。",
        causes: [77], effects: [] },

      { id: 79, year: -316, title: "秦灭巴蜀", country: "秦", category: "战争",
        summary: "司马错率军灭蜀国和巴国，秦国获得稳固后方。",
        detail: "巴蜀两国相攻，都向秦国求救。秦惠文王欲伐韩，司马错力主先取巴蜀——「得蜀则得楚，楚亡则天下并」。惠文王从之，派司马错率军从石牛道入蜀。秦军先后灭蜀国、巴国，设置蜀郡、巴郡。巴蜀成为秦国粮仓和战略后方。",
        causes: [], effects: [85] },
      { id: 80, year: -313, title: "张仪诳楚", country: "秦", category: "外交",
        summary: "张仪以许诺六百里商於之地诱使楚怀王与齐断交。",
        detail: "张仪出使楚国，许诺只要楚与齐绝交，秦愿献商於之地六百里。楚怀王贪其利，果然与齐绝交，还派勇士去齐国辱骂齐王。事后张仪说只说六里。怀王大怒，发兵攻秦。此事件充分暴露了楚怀王的愚蠢和张仪的狡诈。",
        causes: [77], effects: [81] },

      { id: 81, year: -312, title: "丹阳蓝田之战", country: "秦", category: "战争",
        summary: "秦楚两场决战，楚军大败，折损八万余人。",
        detail: "楚怀王遣屈匄率大军攻秦，双方战于丹阳。秦军在丹阳大败楚军，斩首八万，俘虏屈匄等七十余将领，夺取汉中六百里地。怀王怒而倾全国之兵再攻秦，深入至蓝田，又大败而归。韩魏趁机南下攻楚，楚国元气大伤。",
        causes: [80], effects: [] },
      { id: 82, year: -307, title: "赵武灵王胡服骑射", country: "赵", category: "改革",
        summary: "赵武灵王推行胡服骑射改革，赵国军事力量飞跃。",
        detail: "赵武灵王面对北方林胡、楼烦、东胡等游牧民族的威胁，力排众议推行改革：令国人改穿胡人短衣窄袖、练习骑射。叔父公子成等保守派激烈反对，武灵王亲自登门说服。改革后赵国组建了强大的骑兵部队，迅速吞并中山、拓地千里。",
        causes: [], effects: [83, 87] },
      { id: 83, year: -302, title: "赵武灵王传位", country: "赵", category: "政变",
        summary: "赵武灵王提前传位给幼子赵惠文王，自称「主父」。",
        detail: "赵武灵王宠爱幼子赵何（生母吴娃），废太子章，将王位传给年幼的赵何（赵惠文王），自称「主父」专事军事征伐。这一不合礼法的传位做法埋下了后来沙丘之变的祸根。",
        causes: [82], effects: [88] },

      { id: 84, year: -301, title: "齐宣王稷下学宫", country: "齐", category: "思想著作",
        summary: "齐宣王扩大学宫规模，稷下学宫成为战国学术中心。",
        detail: "稷下学宫位于齐国都城临淄稷门之外，创建于齐威王时期，齐宣王时达到鼎盛。汇聚了邹衍、淳于髡、田骈、慎到、环渊、接子、鲁仲连、荀子等数百上千学者，自由讨论、著书立说。儒、道、法、墨、名、阴阳各家在此交流争鸣。",
        causes: [], effects: [] },
      { id: 85, year: -299, title: "楚怀王被扣秦国", country: "秦", category: "外交",
        summary: "秦昭襄王约楚怀王在武关会盟，楚怀王赴约后被扣留。",
        detail: "秦昭襄王约楚怀王在武关会盟。屈原力劝不可赴约——「秦虎狼之国，不可信」。怀王庶子子兰劝行。怀王入关后即被秦兵劫持押往咸阳，昭襄王迫其割地称臣。怀王坚决不从，被扣留软禁。楚国另立太子横为楚顷襄王。",
        causes: [], effects: [89] },

      { id: 86, year: -296, title: "楚怀王死于秦", country: "秦", category: "人物生卒",
        summary: "楚怀王试图逃归楚国未果，在秦国囚禁中死去。",
        detail: "楚怀王曾趁秦国不备逃出咸阳，秦人封锁道路，怀王从小道逃往赵国。赵人不敢收留，又欲逃往魏国，被秦追兵捕获。怀王最终在咸阳抑郁而死，秦国将其尸体归还楚国。楚人皆怜之，如悲亲戚。此事使合纵抗秦成为共识。",
        causes: [85], effects: [] },
      { id: 87, year: -295, title: "沙丘之变", country: "赵", category: "政变",
        summary: "赵武灵王被围困沙丘宫活活饿死。",
        detail: "废太子章发动叛乱，被赵惠文王派兵平定。章逃入主父所居的沙丘宫，赵将公子成和李兑率兵围宫杀章，因惧怕主父报复遂继续围宫。主父被围困三月，饿极掏食雏雀，最终饿死宫中。一代雄主落得如此凄惨下场。",
        causes: [83], effects: [] },

      { id: 88, year: -293, title: "伊阙之战", country: "秦", category: "战争",
        summary: "白起在伊阙大败韩魏联军，斩首二十四万。",
        detail: "秦将白起率军攻韩魏，双方战于伊阙（今河南洛阳南）。韩魏联军互不统属，都希望对方打头阵。白起先以疑兵牵制韩军，集中兵力击溃魏军，再转头歼灭韩军。此战斩首二十四万，白起一战成名，秦国东进之势不可阻挡。",
        causes: [], effects: [97] },

      { id: 89, year: -288, title: "齐秦互称帝", country: "齐", category: "外交",
        summary: "齐湣王与秦昭襄王同时称帝，以试探诸侯反应。",
        detail: "秦昭襄王在宜阳称「西帝」，并派使者尊齐湣王为「东帝」。苏秦此时扮演了关键角色，力劝齐湣王去帝号以争取诸侯支持伐秦。两个月后齐湣王去帝号恢复称王，秦昭襄王也只好跟着去帝号。",
        causes: [], effects: [91] },
      { id: 90, year: -286, title: "齐灭宋", country: "齐", category: "战争",
        summary: "齐湣王灭亡宋国，但引起列国恐慌。",
        detail: "齐湣王出兵灭亡宋国，吞并其富庶领土。宋康王「射天笞地」，狂妄自大，国内大乱。齐国趁势灭宋。但此举使齐国面积暴增，且截断了秦国通往东方的通道，引发列国恐慌，为五国伐齐埋下伏笔。",
        causes: [], effects: [91] },

      { id: 91, year: -284, title: "五国伐齐", country: "齐", category: "战争",
        summary: "燕将乐毅率五国联军伐齐，齐国几乎亡国。",
        detail: "燕昭王为报齐灭燕之仇，以乐毅为上将，联合秦、赵、韩、魏五国攻齐。联军在济西大败齐军，乐毅率燕军独进深入，连下齐国七十余城，攻入临淄。齐湣王逃亡途中被杀。齐国仅剩即墨和莒城两座孤城。",
        causes: [89, 90], effects: [92, 93] },
      { id: 92, year: -283, title: "田单复齐", country: "齐", category: "战争",
        summary: "田单以火牛阵破燕军，收复齐国失地。",
        detail: "田单在即墨被推为将，坚守数年。燕昭王去世后燕惠王即位，中了田单反间计以骑劫取代乐毅。田单收集千余头牛，角缚尖刀、尾束苇草，夜间点火驱牛冲向燕军大营，五千壮士随后掩杀。燕军大溃，田单乘胜收复七十余城。",
        causes: [91], effects: [] },

      { id: 93, year: -279, title: "渑池之会", country: "赵", category: "会盟",
        summary: "秦赵渑池会盟，蔺相如逼迫秦王击缶保全国体。",
        detail: "秦昭襄王约赵惠文王在渑池会盟。宴席上秦王令赵王鼓瑟，秦史官记「某年月日，秦王令赵王鼓瑟」。蔺相如以死相逼请秦王击缶，秦王不肯，相如说：「五步之内，相如请得以颈血溅大王矣！」秦王只好击缶，赵史官亦记之。相如功成，拜为上卿。",
        causes: [], effects: [94] },
      { id: 94, year: -279, title: "将相和", country: "赵", category: "外交",
        summary: "廉颇负荆请罪，蔺相如以大局为重，将相和好。",
        detail: "蔺相如因渑池之功拜上卿，位在名将廉颇之上。廉颇不服，扬言要羞辱相如。相如处处回避，门人不解，相如说：「吾所以为此者，以先国家之急而后私仇也。」廉颇闻之，肉袒负荆登门谢罪，二人结为刎颈之交。",
        causes: [93], effects: [] },
      { id: 95, year: -278, title: "白起拔郢", country: "秦", category: "战争",
        summary: "白起攻破楚国都城郢都，楚国被迫迁都于陈。",
        detail: "秦将白起率大军深入楚境，攻克楚国经营数百年的都城郢都，焚烧楚先王陵墓夷陵。楚顷襄王仓皇出逃，迁都于陈（今河南淮阳）。白起因功封为武安君。此战后楚国丧失了核心区域，从此一蹶不振再无争霸之力。",
        causes: [], effects: [96] },
      { id: 96, year: -278, title: "屈原投江", country: "楚", category: "人物生卒",
        summary: "屈原闻郢都陷落，悲愤投汨罗江而死。",
        detail: "屈原名平，楚国宗室，曾任左徒、三闾大夫，主张联齐抗秦。遭上官大夫靳尚、令尹子兰等人排挤，被楚怀王、顷襄王先后流放。郢都陷落后屈原在汨罗江畔写下《怀沙》之赋，抱石投江而死。后人以其忌日（农历五月初五）为端午节。",
        causes: [95], effects: [] },

      { id: 97, year: -270, title: "范雎入秦", country: "秦", category: "外交",
        summary: "范雎从魏国逃脱入秦，提出「远交近攻」战略。",
        detail: "范雎魏国人，在魏国被须贾诬陷、被魏齐鞭打装死才逃脱。化名张禄入秦，在秦国使者王稽推荐下面见秦昭襄王，提出「远交近攻」——与远处的齐楚燕等交好、集中力量蚕食邻近的韩魏，先得寸则王之寸、得尺则王之尺。此战略成为秦国统一天下的基本方针。",
        causes: [], effects: [100] },
      { id: 98, year: -264, title: "荀子游秦", country: "秦", category: "思想著作",
        summary: "荀子游历秦国，评价秦国百姓淳朴、官吏严肃、朝廷高效。",
        detail: "荀子（荀况）游历秦国，范雎问他观感如何。荀子说秦国「百姓朴、百吏肃然、士大夫不比周」，但也批评「无儒」是秦国的短板——「力术止，义术行」，只用强力而不行仁义终有限度。",
        causes: [], effects: [] },

      { id: 99, year: -260, title: "长平之战（全过程）", country: "秦", category: "战争",
        summary: "秦赵长平决战，白起坑杀赵国降卒四十余万，赵国元气大伤。",
        detail: "秦攻韩上党，上党守将降赵，赵接受上党引发秦赵大战。赵将廉颇在长平筑垒坚守三年，秦军不能进。秦用反间计散布「秦独畏马服君之子赵括」，赵孝成王中计以赵括代廉颇。赵括到前线后改守为攻，秦将白起佯败后退，以奇兵截断赵军退路和粮道。赵军被围四十六日，粮尽援绝，赵括突围时被射杀。四十余万赵军投降，白起认为「赵卒反复非尽杀之恐为乱」，乃全部坑杀，仅放归二百四十名少年兵。",
        causes: [97], effects: [101, 102] },
      { id: 100, year: -257, title: "邯郸之围", country: "赵", category: "战争",
        summary: "秦军围攻赵都邯郸，信陵君窃符救赵，秦军退却。",
        detail: "长平之战后秦军乘胜围攻赵都邯郸。赵国危在旦夕，平原君赵胜率二十门客赴楚求救，毛遂自荐说服楚考烈王出兵。同时信陵君魏无忌窃得魏王兵符，杀晋鄙夺军权，率八万魏军救赵。秦军在楚魏联军夹击下解围而去。",
        causes: [99], effects: [] },
      { id: 101, year: -256, title: "秦灭西周国", country: "秦", category: "战争",
        summary: "秦国灭亡西周国，周赧王去世，周王朝终结。",
        detail: "秦昭襄王派将军摎攻灭西周国（此时周已分为东西二周），西周君尽献其邑三十六、人口三万。同年周赧王去世，延续约八百年的周王朝至此终结。",
        causes: [99], effects: [105] },

      { id: 102, year: -251, title: "鄗之战", country: "赵", category: "战争",
        summary: "燕国趁赵长平之败后虚弱攻赵，反被赵军大败。",
        detail: "燕王喜趁赵国长平大败之机派栗腹率大军攻赵。赵将廉颇、乐乘率军迎击，在鄗地大败燕军，杀栗腹，乘胜追击围困燕都。燕割五城求和。此战表明即使在长平惨败后，赵国仍有相当军事实力。",
        causes: [99], effects: [] },
      { id: 103, year: -249, title: "吕不韦相秦", country: "秦", category: "政变",
        summary: "吕不韦被秦庄襄王拜为丞相，封文信侯。",
        detail: "吕不韦本是阳翟大商人，在邯郸遇见秦质子异人（后改名子楚），认为「奇货可居」。他帮助异人获得华阳夫人的支持立为太子，并将已怀孕的赵姬送给异人。异人即位为秦庄襄王后拜吕不韦为相。吕不韦聚门客三千，令其各著所闻编成《吕氏春秋》。",
        causes: [], effects: [107] },
      { id: 104, year: -249, title: "秦灭东周国", country: "秦", category: "战争",
        summary: "吕不韦率军灭亡东周国，东西周皆归秦有。",
        detail: "秦庄襄王派吕不韦率军灭亡东周国。至此东、西两周全部被秦国吞并。周王室自武王伐纣建国至此彻底终结。周王朝享国约八百年，是中国历史上最长的王朝。",
        causes: [], effects: [] },

      { id: 105, year: -247, title: "秦王政即位", country: "秦", category: "政变",
        summary: "嬴政十三岁即秦王位，吕不韦以仲父身份摄政。",
        detail: "秦庄襄王在位三年而卒，太子嬴政即位，年仅十三岁。吕不韦以相国兼仲父身份摄政，与太后赵姬共同辅政。此时秦已据有天下三分之一以上的土地和人口，统一之势已成。",
        causes: [], effects: [108] },
      { id: 106, year: -246, title: "郑国渠始建", country: "秦", category: "改革",
        summary: "韩国水工郑国入秦修渠，意在消耗秦之国力，反成万世之利。",
        detail: "韩国派水工郑国入秦献策修渠，企图以大型工程消耗秦国民力以延缓秦灭韩的计划。工程进行中被秦发觉，秦王政欲杀郑国。郑国说：「臣为韩延数岁之命，然渠成亦秦之万世利也。」秦王令其继续施工。郑国渠引泾水东注洛水，灌田四万余顷，关中成为沃野。",
        causes: [], effects: [] },
      { id: 107, year: -241, title: "最后一次合纵攻秦", country: "秦", category: "战争",
        summary: "六国最后一次合纵抗秦，被秦军击退。",
        detail: "赵将庞煖组织赵、楚、魏、燕、韩五国最后一次合纵攻秦。联军攻至蕞城（今陕西临潼北），秦军出击大败联军。此后六国再无能力组织对秦的联合行动，各国在秦军的各个击破之下逐一覆灭。",
        causes: [], effects: [] },

      // ── 秦统一战争 ──
      { id: 108, year: -239, title: "嫪毐之乱", country: "秦", category: "政变",
        summary: "嫪毐谋反被平定，牵连吕不韦被免相。",
        detail: "太后宠臣嫪毐在宫中骄横跋扈，纠集党羽发动叛乱。秦王政果断派昌平君、昌文君率军平定，嫪毐被车裂灭族。此事牵连吕不韦——嫪毐原是吕不韦献给太后的假宦官。次年吕不韦被免相，迁居封地河南。",
        causes: [103, 105], effects: [109] },
      { id: 109, year: -237, title: "吕不韦免相", country: "秦", category: "政变",
        summary: "吕不韦被免去相国之职，秦王政开始亲政。",
        detail: "嫪毐之乱牵连吕不韦，秦王政本想诛杀吕不韦，因其功大且宾客辩士游说者众而仅免相。吕不韦回到封地后诸侯宾客使者络绎不绝。秦王恐其生变，赐书训斥，吕不韦饮鸩自杀。",
        causes: [108], effects: [110] },
      { id: 110, year: -236, title: "李斯谏逐客", country: "秦", category: "改革",
        summary: "秦王政下逐客令，李斯上《谏逐客书》劝止。",
        detail: "韩国水工郑国事件暴露后，秦宗室大臣建议驱逐所有外国客卿。楚国上蔡人李斯也在被逐之列，遂上《谏逐客书》——「泰山不让土壤故能成其大，河海不择细流故能就其深」。秦王政阅后幡然醒悟，立即废除逐客令，召回李斯官复原职。",
        causes: [109], effects: [] },
      { id: 111, year: -233, title: "韩非入秦遇害", country: "韩", category: "人物生卒",
        summary: "韩非入秦被李斯陷害死于狱中，留下《韩非子》。",
        detail: "韩非是韩国公子，口吃而善著书。秦王政读到《孤愤》、《五蠹》等篇，感叹「嗟乎，寡人得见此人与之游，死不恨矣！」李斯告以乃韩非所作。为得韩非，秦急攻韩，韩王派韩非入秦。李斯嫉其才，进谗言陷韩非入狱，逼其服毒自杀。韩非虽死，其法家思想被秦国全盘采纳。",
        causes: [], effects: [] },

      { id: 112, year: -230, title: "秦灭韩", country: "韩", category: "战争",
        summary: "秦将内史腾灭韩国，韩王安被俘。",
        detail: "秦将内史腾率军进攻韩国，韩王安投降。韩国成为六国中最先灭亡的国家。秦在韩地设置颍川郡。韩国地处四战之地，夹在秦、魏、楚之间，是七雄中最弱小的国家。",
        causes: [110], effects: [113] },
      { id: 113, year: -228, title: "秦灭赵", country: "赵", category: "战争",
        summary: "秦将王翦灭赵，赵王迁被俘。",
        detail: "秦将王翦率大军攻赵，赵将李牧、司马尚坚守井陉关。秦用反间计贿赂赵王迁宠臣郭开，诬李牧谋反。赵王杀李牧，撤换司马尚。王翦乘机猛攻，大破赵军，攻入邯郸俘虏赵王迁。赵国灭亡，秦在赵地设置邯郸郡。",
        causes: [112], effects: [115] },
      { id: 114, year: -227, title: "荆轲刺秦王", country: "燕", category: "外交",
        summary: "燕太子丹派荆轲刺杀秦王政未遂，风萧萧兮易水寒。",
        detail: "燕太子丹眼看秦军逼近，派荆轲携秦国叛将樊於期的首级和燕国督亢地图入秦献礼。荆轲在咸阳宫图穷匕首见，抓住秦王衣袖刺杀未中。秦王绕柱而走，侍医夏无且以药囊掷荆轲，左右大喊「王负剑！」秦王拔剑砍伤荆轲，卫士上前格杀。",
        causes: [113], effects: [116] },
      { id: 115, year: -226, title: "秦破燕都", country: "燕", category: "战争",
        summary: "秦王政遣王翦攻燕，攻破燕都蓟城。",
        detail: "荆轲刺秦失败后秦王政大怒，遣王翦率大军攻燕。秦军连战连捷，攻破燕都蓟城（今北京西南），燕王喜和太子丹逃往辽东。后燕王喜杀太子丹献首以求和，秦国暂缓追击。",
        causes: [114], effects: [118] },
      { id: 116, year: -225, title: "秦灭魏", country: "魏", category: "战争",
        summary: "秦将王贲引黄河水灌魏都大梁，魏王假出降。",
        detail: "秦将王贲（王翦之子）率军攻魏，久攻不下大梁，乃引黄河、鸿沟之水灌城。大梁城墙被泡塌，魏王假出城投降。魏国灭亡，秦在魏地设置砀郡。",
        causes: [113], effects: [] },
      { id: 117, year: -223, title: "秦灭楚", country: "楚", category: "战争",
        summary: "王翦率六十万大军灭楚，楚王负刍被俘。",
        detail: "秦王政最初问老将王翦攻楚需多少兵力，王翦答六十万，秦王以为怯，改命李信率二十万攻楚。李信先胜后败，被楚军追击三日三夜。秦王亲自登门向王翦谢罪，给足六十万大军。王翦坚壁不出以逸待劳，待楚军疲惫后出击，大破楚军，俘虏楚王负刍。",
        causes: [116], effects: [118] },
      { id: 118, year: -222, title: "秦灭燕", country: "燕", category: "战争",
        summary: "王贲率军攻辽东，俘虏燕王喜，燕国灭亡。",
        detail: "秦将王贲攻辽东，俘虏燕王喜。燕国灭亡，秦在燕地设置辽东郡、辽西郡和上谷郡。",
        causes: [117], effects: [119] },
      { id: 119, year: -221, title: "秦灭齐统一天下", country: "齐", category: "战争",
        summary: "秦将王贲灭齐，秦王政统一天下称始皇帝。",
        detail: "齐国在秦国逐一灭五国时始终保持中立，不助五国抵抗——「秦日夜攻三晋、燕、楚，五国各自救，齐不救」。齐王建听信相国后胜受秦国贿赂的怂恿，不修战备。待五国尽灭，秦将王贲突然从燕地南下攻齐，齐王建不战而降。秦统一天下，秦王政改称号为「始皇帝」，废分封、设郡县、统一文字和度量衡。春秋战国五百余年的分裂割据时代终结。",
        causes: [117, 118], effects: [] },

      // ── 思想文化事件 ──
      { id: 120, year: -580, title: "老子著《道德经》", country: "周", category: "思想著作",
        summary: "老子出任周守藏室之史，著《道德经》五千言。",
        detail: "老子姓李名耳字聃，楚国苦县人。据说他看到周朝衰微，西出函谷关时关令尹喜强求著书，乃著《道德经》上下篇五千余言而去，不知所终。《道德经》以「道可道，非常道」开篇，是道家学派最核心的经典。",
        causes: [], effects: [41] },
      { id: 121, year: -512, title: "孙武献兵法", country: "吴", category: "思想著作",
        summary: "孙武以《孙子兵法》十三篇见吴王阖闾，被拜为将。",
        detail: "齐人孙武以兵法十三篇见吴王阖闾，阖闾令其以宫中美女试演阵法。孙武三令五申后斩不听号令的吴王二宠姬，宫女肃然。阖闾知孙武能用兵，拜为将军。《孙子兵法》成为兵家圣典，「知彼知己、百战不殆」等思想影响至今。",
        causes: [], effects: [42] },
      { id: 122, year: -500, title: "晏婴去世", country: "齐", category: "人物生卒",
        summary: "齐国名相晏婴去世，以「晏子使楚」等故事闻名后世。",
        detail: "晏婴字平仲，历事齐灵公、庄公、景公三朝，以节俭力行、善于辞令著称。著名典故「晏子使楚」中他以「橘生淮南则为橘、生于淮北则为枳」巧妙回应楚王的侮辱。「二桃杀三士」则展现了其政治智谋。",
        causes: [], effects: [] },
      { id: 123, year: -496, title: "孙子去世", country: "吴", category: "人物生卒",
        summary: "孙武去世，留下不朽兵学经典《孙子兵法》。",
        detail: "孙武辅佐吴王阖闾西破强楚、北威齐晋，使吴国一时称霸东南。其兵法十三篇以「兵者国之大事也」开篇，系统阐述了战争的基本原则、战略战术和用间之道，是世界军事史上最重要的著作之一。",
        causes: [], effects: [] },
      { id: 124, year: -465, title: "勾践去世", country: "越", category: "人物生卒",
        summary: "越王勾践去世，卧薪尝胆的故事流传千古。",
        detail: "勾践自吴归国后卧薪尝胆二十余年，最终灭吴雪耻。范蠡功成身退，据说携西施泛舟五湖而去，后经商成为巨富（陶朱公）。文种不听范蠡「飞鸟尽良弓藏，狡兔死走狗烹」的警告，被勾践赐死。",
        causes: [], effects: [] },
      { id: 125, year: -440, title: "墨家学派创立", country: "宋", category: "思想著作",
        summary: "墨子创立墨家学派，倡兼爱、非攻、尚贤、节用。",
        detail: "墨子名翟，宋国人（一说鲁国人）。墨家主张「兼相爱、交相利」，反对不义战争（非攻）、提倡节俭（节用、节葬）、推举贤能（尚贤）、反对音乐（非乐）。墨家组织严密，弟子皆可赴汤蹈火，是战国时期与儒家并列的显学。",
        causes: [], effects: [] },
      { id: 126, year: -399, title: "苏格拉底之死", country: "其他", category: "人物生卒",
        summary: "（参照事件）希腊哲学家苏格拉底被雅典判处死刑。",
        detail: "苏格拉底被雅典以「不敬神」和「败坏青年」的罪名判处死刑，饮毒酒而死。此事发生时正值战国初期，可作为东西方文明比较的时间参考点。",
        causes: [], effects: [] },
      { id: 127, year: -385, title: "吴起去世", country: "楚", category: "人物生卒",
        summary: "吴起在楚国被旧贵族射杀，一代兵家和改革家陨落。",
        detail: "吴起是战国初期最杰出的人物之一——在鲁国大破齐军、在魏国创武卒制夺河西、在楚国推行变法。他通晓兵家、法家、儒家，著有《吴子兵法》。其被射杀于楚悼王葬礼上的结局极为悲惨，但也拉上了七十余家旧贵族陪葬。",
        causes: [], effects: [] },
      { id: 128, year: -372, title: "孟子出生", country: "邹", category: "人物生卒",
        summary: "孟子出生，后被尊为「亚圣」，儒家学派集大成者。",
        detail: "孟子名轲，邹国人。受业于子思之门人，继承并发展了孔子学说，主张「性善论」、「仁政」、「民贵君轻」。周游列国游说诸侯行仁政，晚年与弟子万章等作《孟子》七篇。",
        causes: [], effects: [] },
      { id: 129, year: -369, title: "庄子出生", country: "宋", category: "人物生卒",
        summary: "庄子出生，道家学派集大成者。",
        detail: "庄子名周，宋国蒙人。曾为漆园吏，生活贫困但拒绝楚王厚聘。其思想以「逍遥游」为核心，主张顺应自然、齐物等观。《庄子》三十三篇汪洋恣肆、瑰丽奇诡，是中国文学和哲学的双重巅峰。",
        causes: [], effects: [] },
      { id: 130, year: -338, title: "商鞅去世", country: "秦", category: "人物生卒",
        summary: "商鞅被车裂而死，但新法不废，秦国已不可逆转地强大。",
        detail: "商鞅在秦国变法十八年，彻底改变了秦国的社会结构和国家实力。「商君治秦，法令至行，公平无私，罚不讳强大，赏不私亲近」，虽然本人惨死，但其变法成果被完整继承，为一百多年后的统一奠定了制度基础。",
        causes: [75], effects: [] },
      { id: 131, year: -310, title: "惠施去世", country: "宋", category: "人物生卒",
        summary: "名家代表人物惠施去世，「合同异」学说创始人。",
        detail: "惠施在魏国为相多年，是庄子的好友和论辩对手。其提出「合同异」——「天与地卑，山与泽平」等命题，探讨名实关系，是战国名家学派的核心人物。庄子过惠施墓曾感叹「自夫子之死也，吾无以为质矣」。",
        causes: [], effects: [] },
      { id: 132, year: -289, title: "孟子去世", country: "邹", category: "人物生卒",
        summary: "孟子去世，留下《孟子》七篇。",
        detail: "孟子被后世尊为「亚圣」，其「民为贵、社稷次之、君为轻」的民本思想、「吾善养吾浩然之气」的人格修养论、「天将降大任于是人也」的磨砺精神，对中华民族性格的形成产生了深远影响。",
        causes: [], effects: [] },
      { id: 133, year: -286, title: "庄子去世", country: "宋", category: "人物生卒",
        summary: "庄子去世，道家思想由学派转为生活哲学。",
        detail: "庄子将老子开创的道家思想发展为一种逍遥自然的人生哲学。其「庄周梦蝶」、「庖丁解牛」、「逍遥游」等寓言深入人心。庄子临终时弟子欲厚葬之，庄子说：「吾以天地为棺椁，以日月为连璧，星辰为珠玑，万物为送賷，吾葬具岂不备邪？」",
        causes: [], effects: [] },
      { id: 134, year: -278, title: "荀子出生", country: "赵", category: "人物生卒",
        summary: "荀子出生，战国末期儒家代表人物兼法家思想先驱。",
        detail: "荀子名况，赵国人。曾三次担任齐国稷下学宫的祭酒（首席学者）。不同于孟子的性善论，荀子主性恶论——认为人性本恶，需要通过礼法教化约束规范。其弟子韩非、李斯都成为法家代表人物，将儒家礼治推向法治方向。",
        causes: [], effects: [] },
      { id: 135, year: -280, title: "韩非出生", country: "韩", category: "人物生卒",
        summary: "韩非出生，法家思想的集大成者。",
        detail: "韩非是韩国公子，口吃而善著书。综合商鞅的「法」、申不害的「术」、慎到的「势」，建立了一套完整的法家君主专制理论体系。认为「刑过不避大臣，赏善不遗匹夫」。其著作《韩非子》是法家思想的最高成就。",
        causes: [], effects: [111] },
      { id: 136, year: -238, title: "荀子去世", country: "楚", category: "人物生卒",
        summary: "荀子去世，战国时期最后一位大儒谢幕。",
        detail: "荀子晚年任楚国兰陵令，终老于此。他融合儒法，其性恶论、礼法并用思想通过韩非、李斯深刻影响了秦国的政治实践。从孔子到荀子，儒学经历了从理想主义到现实主义的转变，为汉代大一统的儒学提供了思想资源。",
        causes: [], effects: [] },

      // ── 其他重要事件 ──
      { id: 137, year: -534, title: "子孔之乱", country: "郑", category: "政变",
        summary: "郑国执政子孔被国人杀死，子产开始登上政治舞台。",
        detail: "郑国经历长期的「七穆」卿族斗争，政局动荡。子孔专权被国人攻杀后，子产（公孙侨）作为穆公子孙之一开始崭露头角，逐步进入郑国的核心决策层。",
        causes: [], effects: [38] },
      { id: 138, year: -645, title: "百里奚相秦", country: "秦", category: "政变",
        summary: "秦穆公以五张羊皮赎回百里奚，百里奚辅佐穆公称霸西戎。",
        detail: "百里奚原为虞国大夫，晋献公灭虞后被掳至晋国为奴，作为秦穆公夫人的陪嫁奴隶送往秦国。百里奚半路逃到楚国被楚人抓获。秦穆公听说他是贤臣，以五张黑公羊皮（当时赎买奴隶的通常价格）将其赎回，拜为上大夫。",
        causes: [], effects: [] },
      { id: 139, year: -594, title: "鲁国初税亩", country: "鲁", category: "改革",
        summary: "鲁国实行「初税亩」，中国历史上首次按土地面积征税。",
        detail: "鲁国「初税亩」——不分公田私田，一律按土地面积征收十分之一的赋税。这标志着井田制的瓦解和土地私有制的确立，是中国赋税制度史上的重大变革。",
        causes: [], effects: [] },
      { id: 140, year: -539, title: "子产作丘赋", country: "郑", category: "改革",
        summary: "子产在郑国按丘征收军赋，扩大兵源和税收基础。",
        detail: "子产推行「作丘赋」——以丘（十六井）为单位征收军赋，打破了只有「国人」才服兵役的旧格局，使「野人」也获得参军和纳税的资格。这项改革遭到了国人的抵制，但子产不为所动。",
        causes: [38], effects: [39] },
      { id: 141, year: -518, title: "吴灭巢", country: "吴", category: "战争",
        summary: "吴王僚灭巢国，吴国势力逐渐逼近楚国核心区域。",
        detail: "吴国在楚国的东南方向持续扩张，「无岁不有吴师」成为楚国的战略噩梦。巢国的灭亡意味着楚国失去了在江淮之间对抗吴国的重要屏障。",
        causes: [], effects: [42] },
      { id: 142, year: -510, title: "吴灭徐", country: "吴", category: "战争",
        summary: "吴王阖闾灭徐国，继续蚕食楚国附庸。",
        detail: "徐国是淮夷中最有实力的古国，长期在楚国和吴国之间摇摆。阖闾即位后灭徐，徐君奔楚。楚国在江淮流域的附庸体系开始全面崩溃。",
        causes: [], effects: [42] },
      { id: 143, year: -501, title: "孔子为鲁司寇", country: "鲁", category: "政变",
        summary: "孔子出任鲁国大司寇（最高司法长官），摄行相事。",
        detail: "在季桓子支持下孔子出任鲁国大司寇，代理相国职权。在任期间诛杀少正卯、推行「堕三都」计划以削弱三家卿族的实力、夹谷会盟中以礼斥齐。但「堕三都」半途而废，孔子与三桓矛盾激化，不久后被迫离开鲁国周游列国。",
        causes: [], effects: [48] },
      { id: 144, year: -404, title: "三家分晋完成", country: "晋", category: "政变",
        summary: "赵、韩、魏完全瓜分晋国领地，晋国作为政治实体终结。",
        detail: "自赵襄子、韩康子、魏桓子三家灭智以来，三家逐步瓜分晋国领土，虽然晋侯的名号还保留了三十年（直到前376年被彻底废除），但晋国作为一个政治实体实际上已经不存在。中国的政治版图从春秋后期的大国争霸进入了战国七雄并立的格局。",
        causes: [60, 65], effects: [] },
      { id: 145, year: -378, title: "狄灭卫", country: "卫", category: "战争",
        summary: "狄人再次攻卫，卫国几乎灭亡，沦为魏国附庸。",
        detail: "卫国自春秋时期的卫懿公好鹤亡国后一直衰弱不振，战国时期更是沦为大国附庸。这次狄人攻卫使卫国完全丧失了独立地位，此后卫国的领土日益缩小，仅保留濮阳一城。",
        causes: [], effects: [] },
      { id: 146, year: -325, title: "秦惠文王称王", country: "秦", category: "政变",
        summary: "秦国国君正式称王，秦国在外交礼仪上与其他大国平起平坐。",
        detail: "秦惠文君在龙门称王，是为秦惠文王。此前魏、齐、楚、燕等大国已经称王，秦国从名义上的「公」提升为「王」，标志着秦国在名分上也成为了大国俱乐部的正式成员。",
        causes: [], effects: [] },
      { id: 147, year: -314, title: "燕国子之之乱", country: "燕", category: "政变",
        summary: "燕王哙禅让王位给相国子之，引发内乱和齐国入侵。",
        detail: "燕王哙效法尧舜禅让的故事，将王位传给相国子之。太子平和将军市被起兵攻子之，燕国大乱数月，死者数万。齐宣王趁机派匡章率军伐燕，五十日攻下燕都。后由于齐军暴虐激起燕人反抗，齐军被迫撤出。此乱为燕昭王后来励精图治、五国伐齐埋下伏笔。",
        causes: [], effects: [91] },
      { id: 148, year: -272, title: "秦灭义渠", country: "秦", category: "战争",
        summary: "秦昭襄王消灭义渠国，彻底解除秦国西陲的后顾之忧。",
        detail: "义渠是西戎中最强大的部落，与秦国时战时和数百年。秦昭襄王时宣太后（芈八子）以色诱义渠王并长期与其保持关系，生有二子。后宣太后在甘泉宫诱杀义渠王，秦军随即出兵消灭义渠国。从此秦国西部彻底安定，可以全力东进。",
        causes: [], effects: [] },
      { id: 149, year: -334, title: "越国衰落", country: "越", category: "战争",
        summary: "越国在北伐齐国失败后国势急转直下，逐渐走向灭亡。",
        detail: "越王无疆（勾践六世孙）北伐齐国，齐威王派使者劝说越王转而攻楚。越王中计转攻楚国，被楚威王大败，越王无疆被杀。楚军趁胜吞并吴越故地。越国残余势力退往闽越山区，分裂为多个小政权。",
        causes: [], effects: [] },
      { id: 150, year: -237, title: "李斯之死", country: "秦", category: "人物生卒",
        summary: "（注：李斯实际死于前208年秦二世时，此处作人物标记）",
        detail: "李斯辅佐秦王政统一天下，官至丞相。始皇死后他与赵高合谋拥立胡亥，后被赵高陷害，腰斩于咸阳市中，夷三族。临刑前他对儿子说：「吾欲与若复牵黄犬，俱出上蔡东门逐狡兔，岂可得乎！」",
        causes: [], effects: [] },
      { id: 151, year: -221, title: "始皇帝改制", country: "秦", category: "改革",
        summary: "秦王政称始皇帝，在全国推行郡县制、统一文字货币度量衡、车同轨。",
        detail: "嬴政自称「始皇帝」，废分封、设三十六郡；以小篆统一文字；统一货币为圆形方孔的半两钱；统一度量衡标准；车同轨、道同距；筑驰道以咸阳为中心辐射全国。这一系列制度创新奠定此后两千年中国政治制度的基本框架。",
        causes: [119], effects: [] }
    ];
