<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#667eea"/>
      <stop offset="100%" stop-color="#764ba2"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  <!-- 圆形背景 -->
  <circle cx="256" cy="256" r="170" fill="rgba(255,255,255,0.95)"/>
  <!-- 乾卦符号 ☰ -->
  <g transform="translate(256,260)" fill="none" stroke="#667eea" stroke-width="18" stroke-linecap="round">
    <line x1="-70" y1="-75" x2="70" y2="-75"/>
    <line x1="-70" y1="-25" x2="70" y2="-25"/>
    <line x1="-70" y1="25" x2="70" y2="25"/>
    <!-- 中间断开模拟阴阳 -->
    <line x1="-70" y1="75" x2="-10" y2="75"/>
    <line x1="10" y1="75" x2="70" y2="75"/>
  </g>
  <!-- 八卦圆环 -->
  <g transform="translate(256,256)" fill="none" stroke="rgba(102,126,234,0.2)" stroke-width="4">
    <circle cx="0" cy="0" r="195"/>
    <circle cx="0" cy="0" r="205"/>
  </g>
</svg>
